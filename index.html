// ── Utilità ────────────────────────────────────────────────────
function downloadFile(content, filename, mime="text/html") {
  const blob = new Blob([content],{type:mime});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function htmlWrapper(title, body) {
  const today = new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
  return `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"/><title>LawHub - ${title}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;padding:32px 24px}.header{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid #e2e8f0}.logo{width:40px;height:40px;background:#4f46e5;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}.header h1{font-size:22px;font-weight:700}.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600}.b-green{background:#d1fae5;color:#065f46}.b-amber{background:#fef3c7;color:#92400e}.b-gray{background:#f1f5f9;color:#475569}.b-red{background:#fee2e2;color:#991b1b}.b-blue{background:#dbeafe;color:#1e40af}.b-indigo{background:#e0e7ff;color:#3730a3}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}th{background:#f8fafc;padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase}td{padding:12px 16px;font-size:13px;border-top:1px solid #f1f5f9}.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}.stat{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.stat-val{font-size:28px;font-weight:800}.stat-lbl{font-size:13px;color:#64748b;margin-top:4px}.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.card-title{font-size:15px;font-weight:600}.card-sub{font-size:12px;color:#94a3b8;margin-top:6px}.footer{margin-top:32px;text-align:center;font-size:11px;color:#94a3b8}@media print{body{padding:16px}}</style>
</head><body>
<div class="header"><div class="logo">L</div><div><h1>LawHub — ${title}</h1><div style="font-size:13px;color:#94a3b8;margin-top:2px">Esportato il ${today}</div></div></div>
${body}
<div class="footer">LawHub Studio Legale &nbsp;·&nbsp; ${today}</div>
</body></html>`;
}
function loadFromStorage() {
  try { const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):null; } catch{ return null; }
}
function saveToStorage(data) {
  try { localStorage.setItem(LS_KEY,JSON.stringify({...data,savedAt:new Date().toISOString()})); } catch{}
}
function getApiKey() {
  return localStorage.getItem(LS_APIKEY)||"";
}
function setApiKey(k) {
  localStorage.setItem(LS_APIKEY, k);
}

// ── Componenti base ────────────────────────────────────────────
function Badge({label,colorClass}){
  return <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${colorClass}`}>{label}</span>;
}
function StatCard({icon,label,value,sub,color}){
  return(
    <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm flex flex-col gap-2">
      <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl ${color}`}>{icon}</div>
      <div className="text-2xl font-bold text-slate-800">{value}</div>
      <div className="text-sm font-medium text-slate-700">{label}</div>
      {sub&&<div className="text-xs text-slate-400">{sub}</div>}
    </div>
  );
}
function Avatar({name,size="md"}){
  const initials=name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const colors=["bg-indigo-100 text-indigo-700","bg-teal-100 text-teal-700","bg-amber-100 text-amber-700","bg-rose-100 text-rose-700","bg-purple-100 text-purple-700"];
  const color=colors[name.charCodeAt(0)%colors.length];
  const sz=size==="sm"?"w-7 h-7 text-xs":"w-9 h-9 text-sm";
  return <div className={`${sz} rounded-full font-semibold flex items-center justify-center flex-shrink-0 ${color}`}>{initials}</div>;
}
function ExportBtn({onClick}){
  return(
    <button onClick={onClick}
      className="flex items-center gap-1.5 text-xs font-medium px-3 py-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 transition border border-transparent hover:border-indigo-200">
      ⬇ Esporta HTML
    </button>
  );
}
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[onClose]);
  return(
    <div className="fixed bottom-6 right-6 z-50 bg-slate-800 text-white text-sm px-4 py-3 rounded-xl shadow-lg flex items-center gap-3">
      <span>✅</span><span>{msg}</span>
      <button onClick={onClose} className="text-slate-400 hover:text-white ml-1">✕</button>
    </div>
  );
}

// ── Backup Panel ───────────────────────────────────────────────
function BackupPanel({data,onRestore,onToast}){
  const [open,setOpen]=useState(false);
  const fileRef=useRef(null);
  const saved=data.savedAt?new Date(data.savedAt).toLocaleString("it-IT"):"mai";

  function downloadBackup(){
    const json=JSON.stringify(data,null,2);
    downloadFile(json,`lawhub_backup_${new Date().toISOString().slice(0,10)}.json`,"application/json");
    onToast("Backup JSON scaricato!"); setOpen(false);
  }
  function handleRestore(e){
    const file=e.target.files?.[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.cases&&d.documents&&d.clients&&d.events){ onRestore(d); onToast("Dati ripristinati!"); setOpen(false); }
        else alert("File di backup non valido.");
      }catch{alert("Errore nella lettura del file.");}
    };
    reader.readAsText(file); e.target.value="";
  }
  return(
    <div className="relative">
      <button onClick={()=>setOpen(!open)} className="flex items-center gap-1.5 text-xs font-medium px-3 py-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200 transition">
        💾 Backup
      </button>
      {open&&(
        <>
          <div className="fixed inset-0 z-10" onClick={()=>setOpen(false)}/>
          <div className="absolute right-0 top-10 z-20 bg-white rounded-2xl border border-slate-200 shadow-xl w-64 p-3 space-y-1">
            <div className="px-2 py-1.5 text-xs text-slate-400 border-b border-slate-50 mb-1">Ultimo salvataggio: {saved}</div>
            <button onClick={downloadBackup} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 transition text-left">💾 Scarica backup JSON</button>
            <button onClick={()=>fileRef.current?.click()} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-slate-700 hover:bg-teal-50 hover:text-teal-700 transition text-left">📂 Ripristina da JSON</button>
            <button onClick={()=>{saveToStorage(data);onToast("Dati salvati nel browser!");setOpen(false);}} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-slate-700 hover:bg-amber-50 hover:text-amber-700 transition text-left">🔄 Salva ora</button>
            <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={handleRestore}/>
          </div>
        </>
      )}
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────────────
function Dashboard({cases,events,clients,onToast}){
  const active=cases.filter(c=>c.status==="Attivo").length;
  const waiting=cases.filter(c=>c.status==="In attesa").length;
  const upcom=events.filter(e=>e.date>="2026-05-10").length;

  function exportHTML(){
    const rows=cases.slice(0,6).map(c=>`<tr><td>${c.title}</td><td>${c.client}</td><td>${c.type}</td><td><span class="badge ${c.status==="Attivo"?"b-green":c.status==="Chiuso"?"b-gray":"b-amber"}">${c.status}</span></td></tr>`).join("");
    const evRows=events.slice(0,5).map(e=>`<tr><td>${new Date(e.date).toLocaleDateString("it-IT")}</td><td>${e.title}</td><td>${e.time}</td><td><span class="badge b-indigo">${e.type}</span></td></tr>`).join("");
    const body=`<div class="stat-grid"><div class="stat"><div class="stat-val">${active}</div><div class="stat-lbl">⚖️ Pratiche attive</div></div><div class="stat"><div class="stat-val">${waiting}</div><div class="stat-lbl">🕐 In attesa</div></div><div class="stat"><div class="stat-val">${upcom}</div><div class="stat-lbl">📅 Udienze prossime</div></div><div class="stat"><div class="stat-val">${clients.length}</div><div class="stat-lbl">👥 Clienti totali</div></div></div><h2 style="font-size:15px;font-weight:700;margin-bottom:12px">Pratiche recenti</h2><table><thead><tr><th>Pratica</th><th>Cliente</th><th>Tipo</th><th>Stato</th></tr></thead><tbody>${rows}</tbody></table><h2 style="font-size:15px;font-weight:700;margin:24px 0 12px">Prossimi appuntamenti</h2><table><thead><tr><th>Data</th><th>Evento</th><th>Ora</th><th>Tipo</th></tr></thead><tbody>${evRows}</tbody></table>`;
    downloadFile(htmlWrapper("Dashboard",body),`lawhub_dashboard_${new Date().toISOString().slice(0,10)}.html`);
    onToast("Dashboard esportata!");
  }
  return(
    <div className="space-y-6">
      <div className="flex items-start justify-between gap-3">
        <div>
          <h2 className="text-xl font-bold text-slate-800">Panoramica studio</h2>
          <p className="text-sm text-slate-500 mt-0.5">Aggiornato al {new Date().toLocaleDateString("it-IT")}</p>
        </div>
        <ExportBtn onClick={exportHTML}/>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <StatCard icon="⚖️" label="Pratiche attive"  value={active}         sub="Casi in corso"      color="bg-indigo-50"/>
        <StatCard icon="🕐" label="In attesa"         value={waiting}        sub="Da definire"        color="bg-amber-50"/>
        <StatCard icon="📅" label="Udienze prossime"  value={upcom}          sub="Prossimi 30 giorni" color="bg-teal-50"/>
        <StatCard icon="👥" label="Clienti totali"    value={clients.length} sub="Privati e aziende"  color="bg-rose-50"/>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-50"><span className="font-semibold text-slate-700 text-sm">Pratiche recenti</span></div>
          <div className="divide-y divide-slate-50">
            {cases.slice(0,4).map(c=>(
              <div key={c.id} className="px-5 py-3 flex items-center gap-3">
                <Avatar name={c.client} size="sm"/>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-slate-800 truncate">{c.title}</div>
                  <div className="text-xs text-slate-400">{c.type}</div>
                </div>
                <Badge label={c.status} colorClass={STATUS_COLOR[c.status]}/>
              </div>
            ))}
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-50"><span className="font-semibold text-slate-700 text-sm">Prossimi appuntamenti</span></div>
          <div className="divide-y divide-slate-50">
            {events.slice(0,4).map(e=>(
              <div key={e.id} className="px-5 py-3 flex items-center gap-3">
                <div className="w-10 text-center flex-shrink-0">
                  <div className="text-xs font-bold text-indigo-600">{new Date(e.date).toLocaleDateString("it-IT",{day:"2-digit",month:"short"})}</div>
                  <div className="text-xs text-slate-400">{e.time}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-slate-800 truncate">{e.title}</div>
                  <div className="text-xs text-slate-400">{e.room}</div>
                </div>
                <Badge label={e.type} colorClass={EVENT_COLOR[e.type]}/>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>

}

// ── Cases ──────────────────────────────────────────────────────
function Cases({cases,setCases,onToast}){
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("Tutti");
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({title:"",client:"",type:"Civile",status:"Attivo",date:"",priority:"Media",judge:"",notes:""});
  const filtered=cases.filter(c=>(filter==="Tutti"||c.status===filter)&&(c.title.toLowerCase().includes(search.toLowerCase())||c.client.toLowerCase().includes(search.toLowerCase())));

  function addCase(){
    if(!form.title||!form.client)return;
    setCases(prev=>[...prev,{...form,id:Date.now()}]);
    setForm({title:"",client:"",type:"Civile",status:"Attivo",date:"",priority:"Media",judge:"",notes:""});
    setShowForm(false); onToast("Pratica aggiunta!");
  }
  function deleteCase(id){ if(window.confirm("Eliminare questa pratica?")) setCases(prev=>prev.filter(c=>c.id!==id)); }

  function exportHTML(){
    const rows=filtered.map(c=>`<tr><td>${c.title}</td><td>${c.client}</td><td>${c.type}</td><td>${c.judge}</td><td>${c.date?new Date(c.date).toLocaleDateString("it-IT"):""}</td><td><span class="badge ${c.priority==="Alta"?"b-red":c.priority==="Bassa"?"b-blue":"b-amber"}">${c.priority}</span></td><td><span class="badge ${c.status==="Attivo"?"b-green":c.status==="Chiuso"?"b-gray":"b-amber"}">${c.status}</span></td></tr>`).join("");
    downloadFile(htmlWrapper("Pratiche",`<table><thead><tr><th>Pratica</th><th>Cliente</th><th>Tipo</th><th>Giudice</th><th>Data</th><th>Priorità</th><th>Stato</th></tr></thead><tbody>${rows}</tbody></table>`),`lawhub_pratiche_${new Date().toISOString().slice(0,10)}.html`);
    onToast("Pratiche esportate!");
  }
  return(
    <div className="space-y-5">
      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
        <h2 className="text-xl font-bold text-slate-800 flex-1">Pratiche</h2>
        <div className="flex gap-2">
          <ExportBtn onClick={exportHTML}/>
          <button onClick={()=>setShowForm(!showForm)} className="bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-xl hover:bg-indigo-700 transition">
            {showForm?"✕ Annulla":"+ Nuova pratica"}
          </button>
        </div>
      </div>
      {showForm&&(
        <div className="bg-white rounded-2xl border border-indigo-100 shadow-sm p-5 space-y-4">
          <div className="text-sm font-semibold text-slate-700">Nuova pratica</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {[["title","Titolo pratica *"],["client","Cliente *"],["judge","Giudice"]].map(([k,lbl])=>(
              <input key={k} placeholder={lbl} value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}
                className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
            ))}
            <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}
              className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
            {[["type","Tipo",["Civile","Penale","Famiglia","Commerciale","Successioni","Fallimentare"]],
              ["status","Stato",["Attivo","In attesa","Chiuso"]],
              ["priority","Priorità",["Alta","Media","Bassa"]]].map(([k,lbl,opts])=>(
              <select key={k} value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}
                className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                {opts.map(o=><option key={o}>{o}</option>)}
              </select>
            ))}
          </div>
          <textarea placeholder="Note (opzionale)" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} rows={2}
            className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"/>
          <button onClick={addCase} className="bg-indigo-600 text-white text-sm font-medium px-5 py-2 rounded-xl hover:bg-indigo-700 transition">Aggiungi pratica</button>
        </div>
      )}

// ── AI Assistant ───────────────────────────────────────────────
function AIAssistant({onToast}){
  const [apiKey,setApiKeyState]=useState(()=>getApiKey());
  const [showKeyInput,setShowKeyInput]=useState(!getApiKey());
  const [tempKey,setTempKey]=useState("");
  const [messages,setMessages]=useState([
    {role:"assistant",content:"Ciao! Sono il tuo assistente legale AI. Posso aiutarti con ricerche normative, analisi di casi, bozze di documenti e molto altro. Come posso assisterti oggi?"}
  ]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[messages,loading]);

  function saveKey(){
    if(!tempKey.startsWith("sk-ant-")){ alert("La chiave deve iniziare con sk-ant-"); return; }
    setApiKey(tempKey); setApiKeyState(tempKey); setShowKeyInput(false); onToast("API key salvata!");
  }

  async function sendMessage(){
    if(!input.trim()||loading)return;
    const userMsg=input.trim(); setInput("");
    setMessages(prev=>[...prev,{role:"user",content:userMsg}]);
    setLoading(true);
    try{
      const history=messages.map(m=>({role:m.role,content:m.content}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:"Sei un assistente legale esperto italiano. Aiuta con ricerche normative, analisi di casi, bozze di atti e consulenze in italiano. Rispondi in modo preciso e professionale.",
          messages:[...history,{role:"user",content:userMsg}]})
      });
      const data=await res.json();
      const reply=data.content?.find(b=>b.type==="text")?.text||"Errore nella risposta.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    }catch(err){
      setMessages(prev=>[...prev,{role:"assistant",content:"Errore di rete. Verifica la connessione e la API key."}]);
    }finally{setLoading(false);}
  }

  function exportHTML(){
    const bubbles=messages.map(m=>`<div style="display:flex;justify-content:${m.role==="user"?"flex-end":"flex-start"};margin-bottom:12px"><div style="max-width:75%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.6;white-space:pre-wrap;background:${m.role==="user"?"#4f46e5":"#fff"};color:${m.role==="user"?"#fff":"#1e293b"};border:${m.role==="user"?"none":"1px solid #e2e8f0"}">${m.content.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div></div>`).join("");
    downloadFile(htmlWrapper("Sessione AI",bubbles),`lawhub_ai_${new Date().toISOString().slice(0,10)}.html`);
    onToast("Sessione AI esportata!");
  }

  const suggestions=["Cos'è la prescrizione penale?","Come si redige un atto di citazione?","Differenza tra dolo e colpa","Procedura fallimentare semplificata"];

  if(showKeyInput) return(
    <div className="flex flex-col items-center justify-center space-y-6 py-16">
      <div className="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center text-white text-3xl">⚖️</div>
      <div className="text-center">
        <h2 className="text-xl font-bold text-slate-800">Assistente Legale AI</h2>
        <p className="text-sm text-slate-500 mt-1">Inserisci la tua API key Anthropic per attivare l'AI</p>
      </div>
      <div className="w-full max-w-md space-y-3">
        <input type="password" placeholder="sk-ant-..." value={tempKey} onChange={e=>setTempKey(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&saveKey()}
          className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
        <p className="text-xs text-slate-400 text-center">Ottieni la chiave su <a href="https://console.anthropic.com/settings/keys" target="_blank" className="text-indigo-500 hover:underline">console.anthropic.com</a> — viene salvata solo in questo browser.</p>
        <button onClick={saveKey} className="w-full bg-indigo-600 text-white text-sm font-medium py-3 rounded-xl hover:bg-indigo-700 transition">Salva e attiva</button>
      </div>
    </div>
  );

  return(
    <div className="flex flex-col space-y-4" style={{height:"calc(100vh - 180px)",minHeight:500}}>
      <div className="flex items-center justify-between gap-3">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white text-lg">⚖️</div>
          <div>
            <h2 className="text-xl font-bold text-slate-800">Assistente Legale AI</h2>
            <p className="text-xs text-slate-400">Powered by Claude</p>
          </div>
        </div>
        <div className="flex gap-2">
          {messages.length>1&&<ExportBtn onClick={exportHTML}/>}
          <button onClick={()=>setShowKeyInput(true)} className="text-xs text-slate-400 hover:text-slate-600 px-2 py-1">🔑 Cambia key</button>
        </div>
      </div>
      {messages.length===1&&(
        <div className="grid grid-cols-2 gap-2">
          {suggestions.map((s,i)=>(
            <button key={i} onClick={()=>setInput(s)}
              className="text-left text-xs bg-white border border-slate-200 rounded-xl p-3 text-slate-600 hover:border-indigo-300 hover:bg-indigo-50 transition">{s}</button>
          ))}
        </div>
      )}
      <div className="flex-1 overflow-y-auto space-y-4 pr-1">
        {messages.map((m,i)=>(
          <div key={i} className={`flex gap-3 ${m.role==="user"?"flex-row-reverse":""}`}>
            <div className={`w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-sm font-bold ${m.role==="assistant"?"bg-indigo-100 text-indigo-700":"bg-slate-200 text-slate-600"}`}>
              {m.role==="assistant"?"AI":"Tu"}
            </div>
            <div className={`max-w-[80%] rounded-2xl px-4 py-3 text-sm leading-relaxed whitespace-pre-wrap ${m.role==="assistant"?"bg-white border border-slate-100 text-slate-700 shadow-sm":"bg-indigo-600 text-white"}`}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&(
          <div className="flex gap-3">
            <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center bg-indigo-100 text-indigo-700 text-sm font-bold">AI</div>
            <div className="bg-white border border-slate-100 shadow-sm rounded-2xl px-4 py-3">
              <div className="flex gap-1 items-center">
                {[0,1,2].map(i=><div key={i} className="w-2 h-2 bg-indigo-400 rounded-full dot-bounce" style={{animationDelay:`${i*0.16}s`}}/>)}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div className="flex gap-2 bg-white border border-slate-200 rounded-2xl p-2 shadow-sm">
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
          placeholder="Scrivi una domanda legale… (Invio per inviare)" rows={1}
          style={{resize:"none",maxHeight:120,overflow:"auto"}}
          className="flex-1 text-sm px-2 py-1.5 focus:outline-none text-slate-700 bg-transparent"/>
        <button onClick={sendMessage} disabled={!input.trim()||loading}
          className="bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-xl hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition">
          Invia
        </button>
      </div>
    </div>
  );
}

// ── Nav ────────────────────────────────────────────────────────
const NAV=[
  {id:"dashboard",label:"Dashboard",    icon:"🏛️"},
  {id:"cases",    label:"Pratiche",      icon:"⚖️"},
  {id:"documents",label:"Documenti",     icon:"📄"},
  {id:"clients",  label:"Clienti",       icon:"👥"},
  {id:"calendar", label:"Agenda",        icon:"📅"},
  {id:"ai",       label:"Assistente AI", icon:"🤖"},
];

// ── App ────────────────────────────────────────────────────────
function App(){
  const [data,setDataRaw]=useState(()=>{
    const stored=loadFromStorage();
    return stored||{cases:DEFAULT_CASES,documents:DEFAULT_DOCUMENTS,clients:DEFAULT_CLIENTS,events:DEFAULT_EVENTS};
  });

  const setData=useCallback((updater)=>{
    setDataRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      saveToStorage(next);
      return next;
    });
  },[]);

  const setCases     = cb=>setData(p=>({...p,cases:    typeof cb==="function"?cb(p.cases):cb}));
  const setDocuments = cb=>setData(p=>({...p,documents:typeof cb==="function"?cb(p.documents):cb}));
  const setClients   = cb=>setData(p=>({...p,clients:  typeof cb==="function"?cb(p.clients):cb}));
  const setEvents    = cb=>setData(p=>({...p,events:   typeof cb==="function"?cb(p.events):cb}));

  const [page,setPage]=useState("dashboard");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast,setToast]=useState(null);

  const navigate=id=>{setPage(id);setSidebarOpen(false);};
  const showToast=msg=>setToast(msg);

  const renderPage=()=>{
    const props={onToast:showToast};
    switch(page){
      case "dashboard": return <Dashboard cases={data.cases} events={data.events} clients={data.clients} {...props}/>;
      case "cases":     return <Cases cases={data.cases} setCases={setCases} {...props}/>;
      case "documents": return <Documents documents={data.documents} setDocuments={setDocuments} {...props}/>;
      case "clients":   return <Clients clients={data.clients} setClients={setClients} {...props}/>;
      case "calendar":  return <CalendarView events={data.events} setEvents={setEvents} {...props}/>;
      case "ai":        return <AIAssistant {...props}/>;
      default:          return <Dashboard cases={data.cases} events={data.events} clients={data.clients} {...props}/>;
    }
  };

  return(
    <div className="flex h-screen bg-slate-50 overflow-hidden">
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      {sidebarOpen&&<div className="fixed inset-0 bg-black/30 z-20 lg:hidden" onClick={()=>setSidebarOpen(false)}/>}

      <aside className={`fixed lg:relative z-30 lg:z-auto inset-y-0 left-0 w-64 bg-white border-r border-slate-100 flex flex-col transform transition-transform duration-300 lg:translate-x-0 ${sidebarOpen?"translate-x-0":"-translate-x-full"}`}>
        <div className="px-6 py-5 border-b border-slate-100">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">L</div>
            <div><div className="font-bold text-slate-800 text-sm">LawHub</div><div className="text-xs text-slate-400">Studio Legale</div></div>
          </div>
        </div>
        <nav className="flex-1 px-3 py-4 space-y-0.5">
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>navigate(n.id)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition text-left ${page===n.id?"bg-indigo-50 text-indigo-700":"text-slate-600 hover:bg-slate-50 hover:text-slate-800"}`}>
              <span className="text-base">{n.icon}</span>
              {n.label}
              {n.id==="ai"&&<span className="ml-auto text-xs bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded-full font-medium">AI</span>}
            </button>
          ))}
        </nav>
        <div className="px-4 py-4 border-t border-slate-100">
          <div className="flex items-center gap-3 px-2">
            <Avatar name="Avv. Giulia Marino"/>
            <div className="flex-1 min-w-0">
              <div className="text-xs font-semibold text-slate-700 truncate">Avv. Giulia Marino</div>
              <div className="text-xs text-slate-400">Admin</div>
            </div>
          </div>
        </div>
      </aside>

      <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header className="bg-white border-b border-slate-100 px-4 lg:px-8 py-4 flex items-center gap-4 flex-shrink-0">
          <button className="lg:hidden text-slate-500 hover:text-slate-700 transition" onClick={()=>setSidebarOpen(true)}>
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <div className="flex-1"><div className="text-base font-semibold text-slate-700">{NAV.find(n=>n.id===page)?.label}</div></div>
          <div className="flex items-center gap-2">
            <BackupPanel data={{...data}} onRestore={d=>setData(d)} onToast={showToast}/>
            <Avatar name="Avv. Giulia Marino" size="sm"/>
          </div>
        </header>
        <main className="flex-1 overflow-y-auto px-4 lg:px-8 py-6">{renderPage()}</main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
